<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cashflow</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --paper:#FBFBF9; --ink:#1B1D1C; --muted:#6B6E6A; --faint:#9A9D98;
    --line:#E5E3DC; --line-strong:#C9C7BF; 
    --income:#0F6E56; --outflow:#A32D2D; --accent:#19543F;
    --row-hover:#F1F3EE; --col-hover:#F1F4F0; 
    --total-bg:#EDF2EE; /* Yearly totals */
    --gtot-bg:#E1E8E3; /* Grand total distinct color */
    --gtot-line:#A3B8AD;
    --gtot-text:#0D4532;
    --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;}
  .wrap{padding:14px 16px 22px;}

  /* ---------- toolbar ---------- */
  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px;}
  .bar h1{font-size:16px;font-weight:600;letter-spacing:.2px;margin:0 8px 0 0;}
  .bar h1 span{color:var(--faint);font-weight:400;}
  .ctl{display:flex;align-items:center;gap:6px;}
  .ctl label{font-size:12px;color:var(--muted);}
  select,button{
    font:inherit;font-size:13px;color:var(--ink);background:#fff;
    border:1px solid var(--line-strong);border-radius:8px;padding:6px 10px;cursor:pointer;
  }
  select:hover,button:hover{border-color:var(--faint);}
  select:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  button:active{transform:translateY(1px);}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;}
  .seg button{border:0;border-radius:0;background:#fff;padding:6px 12px;}
  .seg button+button{border-left:1px solid var(--line-strong);}
  .seg button[aria-pressed="true"]{background:var(--accent);color:#fff;}
  .spacer{flex:1}
  .stamp{font-size:12px;color:var(--faint);}

  /* ---------- table ---------- */
  .scroller{overflow:auto;max-height:82vh;border:1px solid var(--line);border-radius:var(--radius);background:#fff;}
  table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;
    font-variant-numeric:tabular-nums;}
  th,td{padding:7px 12px;white-space:nowrap;border-bottom:1px solid var(--line);}
  thead th{
    position:sticky;top:0;z-index:5;background:#fff;
    font-size:11.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);
    text-align:right;border-bottom:1.5px solid var(--line-strong);
  }
  thead th.lbl{text-align:left; z-index:6;}
  th.year{cursor:pointer;user-select:none;color:var(--ink);}
  th.year:hover{background:var(--row-hover);}
  th.year .chev{display:inline-block;margin-right:4px;color:var(--faint);transition:transform .15s;}
  th.year.open .chev{transform:rotate(90deg);}
  
  /* Distinct Grand Total styling */
  th.gtot{background:var(--gtot-bg); color:var(--gtot-text); border-left:2px solid var(--gtot-line); border-bottom:2px solid var(--gtot-line);}
  td.gtot{background:var(--gtot-bg); border-left:2px solid var(--gtot-line); font-weight:700; color:var(--gtot-text);}

  td{text-align:right;font-size:13.5px;}
  td.num{color:var(--ink);}
  td.neg{color:var(--outflow);}
  td.pos{color:var(--income);}
  td.zero{color:var(--faint);}
  td.ytot{border-left:1px solid var(--line);font-weight:600;background:var(--total-bg);}

  /* sticky first column */
  th:first-child,td:first-child{
    position:sticky;left:0;z-index:3;
    border-right:1px solid var(--line);max-width:320px;overflow:hidden;text-overflow:ellipsis;
  }

  /* Tree hierarchy rows */
  tr.node{cursor:pointer;user-select:none;}
  tr.node .chev{display:inline-block;width:14px;color:var(--muted);transition:transform .15s;}
  tr.node.open .chev{transform:rotate(90deg);}
  
  /* Levels styling */
  tr.lvl1 td{background:#EBECE8; font-weight:700;}
  tr.lvl1:hover td{background:#E2E3DF;}
  td.lbl-lvl1{padding-left:12px;}

  tr.lvl2 td{background:#F4F5F1; font-weight:600;}
  tr.lvl2:hover td{background:#EAECED;}
  td.lbl-lvl2{padding-left:32px;}

  tr.lvl3 td{background:#FBFBF9; font-weight:600;}
  tr.lvl3:hover td{background:var(--row-hover);}
  td.lbl-lvl3{padding-left:52px;}

  tr.lvl4 td{background:#FFFFFF; font-weight:400;}
  tr.lvl4:hover td{background:var(--row-hover);}
  td.lbl-lvl4{padding-left:72px; color:var(--muted);}

  /* grand total bottom row */
  tr.grand td{
    font-weight:700;background:#fff;
    border-top:2px solid var(--ink);border-bottom:6px double var(--ink);
    position:sticky;bottom:0;z-index:4;
  }
  tr.grand td:first-child{z-index:5;}
  tr.grand td.gtot{border-top:2px solid var(--gtot-text); border-bottom:6px double var(--gtot-text);}

  td.colhl{background:var(--col-hover) !important;}

  /* states */
  .state{padding:60px 20px;text-align:center;color:var(--muted);}
  .state .big{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;}
  .state code{background:#EBECE8;padding:2px 6px;border-radius:6px;font-size:12px;}
  .pulse{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);
    margin-right:8px;animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .pulse{animation:none}
    th.year .chev,tr.node .chev{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <h1>Cashflow <span>· pivot</span></h1>
    <div class="ctl">
      <label for="company">Cég</label>
      <select id="company"><option value="0">Összes cég</option></select>
    </div>
    <div class="ctl">
      <label>Bank</label>
      <div class="seg" role="group" aria-label="Bank összegek">
        <button id="modeGross" aria-pressed="true">Bruttó</button>
        <button id="modeNet" aria-pressed="false">Nettó</button>
      </div>
    </div>
    <button id="expandAll">Összes kibontása</button>
    <button id="collapseAll">Összecsukás</button>
    <span class="spacer"></span>
    <button id="csv" title="Exportálás CSV-be">CSV</button>
    <button id="refresh">Frissítés</button>
    <span class="stamp" id="stamp"></span>
  </div>
  <div id="view" class="scroller">
    <div class="state"><span class="pulse"></span>Adatok betöltése…</div>
  </div>
</div>

<script>
"use strict";

/* ================= CONFIG =================
   Subcategories whose data comes EXCLUSIVELY from Timesheets.
   Matching rows in Bank_Transactions / Expenses are skipped. */
const PAYROLL_TAX_SUBCATS = ["SZJA", "SZOCHO", "TBJ"];
/* ========================================== */

const HUF = new Intl.NumberFormat('hu-HU', {maximumFractionDigits: 0});
const MONTHS_HU = ["jan","feb","márc","ápr","máj","jún","júl","aug","szep","okt","nov","dec"];
const MISSING_VENDOR = "Nem megadott";

let DB = null;            
let state = {
  company: 0,             
  bankNet: false,         
  openNodes: new Set(),   // format: "P_12", "M_12_5", "S_12_5_8"
  openYears: new Set(),   
};

/* ---------- Grist plumbing ---------- */
function rowsOf(t){
  const keys = Object.keys(t).filter(k => Array.isArray(t[k]));
  const n = t.id ? t.id.length : 0;
  const out = new Array(n);
  for(let i=0;i<n;i++){ const r={}; for(const k of keys) r[k]=t[k][i]; out[i]=r; }
  return out;
}
function ymOf(epoch){
  if(!epoch) return null;
  const d = new Date(epoch*1000);
  return d.getUTCFullYear()*100 + (d.getUTCMonth()+1); 
}

async function loadAll(){
  const names = ["Timesheets","Bank_Transactions","Expenses","Categories","SubCategories","Companies","Employees","Projects"];
  const tabs = await Promise.all(names.map(n => grist.docApi.fetchTable(n)));
  DB = {};
  names.forEach((n,i) => DB[n] = rowsOf(tabs[i]));
}

/* ---------- aggregation ---------- */
function aggregate(){
  // Dictionaries for mapping IDs to names
  const empMap = new Map(DB.Employees.map(e => [e.id, e.Name]));
  const projMap = new Map(DB.Projects.map(p => [p.id, p.Project || p.Name]));
  const catMap = new Map(DB.Categories.map(c => [c.id, c.Name || ("#"+c.id)]));
  const subMap = new Map(DB.SubCategories.map(s => [s.id, {name: s.Name || ("#"+s.id), parent: s.Parent_Category||0}]));

  const subIdByName = {};
  for(const s of DB.SubCategories){
    if(PAYROLL_TAX_SUBCATS.includes(s.Name)) subIdByName[s.Name] = s.id;
  }
  const payrollParentId = (DB.Categories.find(c => c.Name === "Közvetlen Munkaerő")||{}).id || -1;
  const taxParentId = subIdByName["SZJA"] ? subMap.get(subIdByName["SZJA"]).parent : -1;

  const excludedSubIds = new Set();
  for(const s of DB.SubCategories){
    if(PAYROLL_TAX_SUBCATS.includes(s.Name) || s.Parent_Category === payrollParentId)
      excludedSubIds.add(s.id);
  }

  // Tree: Project -> MainCat -> SubCat -> Vendor
  const tree = new Map();
  const add = (pId, mId, sId, vendorName, ym, val) => {
    if(!pId || !mId || !sId || !ym || !val) return; // Strict Drop Filter
    
    if(!tree.has(pId)) tree.set(pId, {name: projMap.get(pId) || `#${pId}`, mCats: new Map()});
    const pNode = tree.get(pId);
    
    if(!pNode.mCats.has(mId)) pNode.mCats.set(mId, {name: catMap.get(mId) || `#${mId}`, sCats: new Map()});
    const mNode = pNode.mCats.get(mId);
    
    if(!mNode.sCats.has(sId)) mNode.sCats.set(sId, {name: subMap.has(sId) ? subMap.get(sId).name : `#${sId}`, vendors: new Map()});
    const sNode = mNode.sCats.get(sId);
    
    const vName = vendorName || MISSING_VENDOR;
    if(!sNode.vendors.has(vName)) sNode.vendors.set(vName, new Map());
    const vMap = sNode.vendors.get(vName);
    
    vMap.set(ym, (vMap.get(ym)||0) + val);
  };
  const subCatParent = id => subMap.has(id) ? subMap.get(id).parent : 0;
  const co = state.company;

  /* 1 — Timesheets */
  for(const r of DB.Timesheets){
    if(co && r.Company !== co) continue;
    const ym = ymOf(r.Date); if(!ym) continue;
    
    const pId = r.Project;
    const vendor = empMap.get(r.Employee) || MISSING_VENDOR;
    
    // Normal Wage
    if(r.Sub_Category){
      const mId = r.Main_Category || subCatParent(r.Sub_Category);
      add(pId, mId, r.Sub_Category, vendor, ym, -(r.Allocated_Wage_Cost||0));
    }
    // Taxes (Mapped to the project they belong to)
    if(subIdByName["TBJ"])    add(pId, taxParentId, subIdByName["TBJ"],    vendor, ym, -(r.Allocated_TBJ||0));
    if(subIdByName["SZJA"])   add(pId, taxParentId, subIdByName["SZJA"],   vendor, ym, -(r.Allocated_SZJA||0));
    if(subIdByName["SZOCHO"]) add(pId, taxParentId, subIdByName["SZOCHO"], vendor, ym, -(r.Allocated_Szocho||0));
  }

  /* 2 — Bank_Transactions */
  for(const r of DB.Bank_Transactions){
    if(co && r.Company !== co) continue;
    if(r.Sub_Category && excludedSubIds.has(r.Sub_Category)) continue;
    const ym = ymOf(r.Date); if(!ym) continue;
    
    const pId = r.Project;
    const mId = r.Category || subCatParent(r.Sub_Category);
    const sId = r.Sub_Category;
    const vendor = r.Partner || MISSING_VENDOR;
    const val = state.bankNet ? (r.Net_Amount||0) : (r.Amount||0);
    
    add(pId, mId, sId, vendor, ym, val);
  }

  /* 3 — Expenses */
  for(const r of DB.Expenses){
    if(co && r.Company !== co) continue;
    if(r.Sub_Category && excludedSubIds.has(r.Sub_Category)) continue;
    const ym = ymOf(r.Date); if(!ym) continue;
    
    const pId = r.Project;
    const mId = r.Category || subCatParent(r.Sub_Category); // Category in expenses maps to Main
    const sId = r.Sub_Category;
    const vendor = r.Vendor || MISSING_VENDOR;
    
    add(pId, mId, sId, vendor, ym, -(r.Amount||0));
  }

  return {tree};
}

/* ---------- sum & formatting ---------- */
function sumRow(perYM){
  const yT = {}; let g=0;
  for(const [ym,v] of perYM){ const y=Math.floor(ym/100); yT[y]=(yT[y]||0)+v; g+=v; }
  return {perYM, yT, g};
}
function mergeMaps(dest, src){
  for(const [ym, val] of src) dest.set(ym, (dest.get(ym)||0) + val);
}

/* ---------- rendering ---------- */
function render(){
  const {tree} = aggregate();
  const view = document.getElementById("view");

  // Collect all year-months present
  const ymSet = new Set();
  const allTotals = { p: new Map(), m: new Map(), s: new Map(), v: new Map(), grand: new Map() };
  
  // Calculate Totals bottom-up
  for(const [pId, pNode] of tree){
    const pMerged = new Map();
    for(const [mId, mNode] of pNode.mCats){
      const mMerged = new Map();
      for(const [sId, sNode] of mNode.sCats){
        const sMerged = new Map();
        for(const [vName, vMap] of sNode.vendors){
          for(const ym of vMap.keys()) ymSet.add(ym);
          allTotals.v.set(`${pId}_${mId}_${sId}_${vName}`, sumRow(vMap));
          mergeMaps(sMerged, vMap);
        }
        allTotals.s.set(`${pId}_${mId}_${sId}`, sumRow(sMerged));
        mergeMaps(mMerged, sMerged);
      }
      allTotals.m.set(`${pId}_${mId}`, sumRow(mMerged));
      mergeMaps(pMerged, mMerged);
    }
    allTotals.p.set(pId, sumRow(pMerged));
    mergeMaps(allTotals.grand, pMerged);
  }

  if(!ymSet.size){
    view.innerHTML = `<div class="state"><div class="big">Nincs megjeleníthető adat</div>
      Ellenőrizd a cégszűrőt, vagy hogy a tranzakciókhoz van-e projekt, fő- és alkategória rendelve.</div>`;
    return;
  }
  const allYM = [...ymSet].sort((a,b)=>a-b);
  const years = [...new Set(allYM.map(ym=>Math.floor(ym/100)))].sort((a,b)=>a-b);
  if(!state._initYears){ state.openYears.add(years[years.length-1]); state._initYears = true; }

  // Columns setup
  const cols = [];
  for(const y of years){
    if(state.openYears.has(y)){
      const months = allYM.filter(ym=>Math.floor(ym/100)===y);
      for(const ym of months) cols.push({type:"m", ym, y});
    }
    cols.push({type:"y", y});
  }
  cols.push({type:"g"});

  const fmt = (v, isZero=false) => {
    if(isZero || !v || Math.abs(v) < 0.5) return `<td class="zero" data-c="$C">–</td>`;
    const cls = v<0 ? "neg" : "pos";
    return `<td class="num ${cls}" data-c="$C">${HUF.format(Math.round(v))}</td>`;
  };
  const cellsFor = t => cols.map((c,i)=>{
    let v=0, extra="";
    if(c.type==="m") v = t.perYM.get(c.ym)||0;
    else if(c.type==="y"){ v = t.yT[c.y]||0; extra=" ytot"; }
    else { v = t.g; extra=" gtot"; }
    let html = fmt(v).replace("$C", i);
    if(extra) html = html.replace('class="', `class="${extra.trim()} `);
    return html;
  }).join("");

  let thead = `<tr><th class="lbl">Projekt / Kategória</th>`;
  thead += cols.map((c,i)=>{
    if(c.type==="m") return `<th data-c="${i}">${MONTHS_HU[(c.ym%100)-1]}</th>`;
    if(c.type==="y") return `<th class="year ${state.openYears.has(c.y)?"open":""}" data-year="${c.y}" data-c="${i}" title="Kattints a hónapok mutatásához"><span class="chev">▸</span>${c.y}</th>`;
    return `<th class="gtot" data-c="${i}">Összesen</th>`;
  }).join("") + `</tr>`;

  // Sorting utilities
  const huSort = (a,b) => String(a).localeCompare(String(b), 'hu', {numeric: true});
  
  let body = "";
  
  // Lvl 1: Projects
  const sortedProjs = [...tree.entries()].sort((a,b)=>huSort(a[1].name, b[1].name));
  for(const [pId, pNode] of sortedProjs){
    const pOpen = state.openNodes.has(`P_${pId}`);
    body += `<tr class="node lvl1 ${pOpen?"open":""}" data-node="P_${pId}">
      <td class="lbl lbl-lvl1"><span class="chev">▸</span>${esc(pNode.name)}</td>${cellsFor(allTotals.p.get(pId))}</tr>`;
    
    if(pOpen){
      // Lvl 2: Main Cats
      const sortedMCats = [...pNode.mCats.entries()].sort((a,b)=>huSort(a[1].name, b[1].name));
      for(const [mId, mNode] of sortedMCats){
        const mOpen = state.openNodes.has(`M_${pId}_${mId}`);
        body += `<tr class="node lvl2 ${mOpen?"open":""}" data-node="M_${pId}_${mId}">
          <td class="lbl lbl-lvl2"><span class="chev">▸</span>${esc(mNode.name)}</td>${cellsFor(allTotals.m.get(`${pId}_${mId}`))}</tr>`;
        
        if(mOpen){
          // Lvl 3: Sub Cats
          const sortedSCats = [...mNode.sCats.entries()].sort((a,b)=>huSort(a[1].name, b[1].name));
          for(const [sId, sNode] of sortedSCats){
            const sOpen = state.openNodes.has(`S_${pId}_${mId}_${sId}`);
            body += `<tr class="node lvl3 ${sOpen?"open":""}" data-node="S_${pId}_${mId}_${sId}">
              <td class="lbl lbl-lvl3"><span class="chev">▸</span>${esc(sNode.name)}</td>${cellsFor(allTotals.s.get(`${pId}_${mId}_${sId}`))}</tr>`;
            
            if(sOpen){
              // Lvl 4: Vendors
              const sortedVendors = [...sNode.vendors.keys()].sort((a,b)=>{
                if(a===MISSING_VENDOR) return 1; if(b===MISSING_VENDOR) return -1;
                return huSort(a,b);
              });
              for(const vName of sortedVendors){
                body += `<tr class="node lvl4">
                  <td class="lbl lbl-lvl4">${esc(vName)}</td>${cellsFor(allTotals.v.get(`${pId}_${mId}_${sId}_${vName}`))}</tr>`;
              }
            }
          }
        }
      }
    }
  }
  body += `<tr class="grand"><td class="lbl">Nettó cashflow</td>${cellsFor(sumRow(allTotals.grand))}</tr>`;

  view.innerHTML = `<table>${thead}${body}</table>`;
  wireTable(view, tree);
  state._csv = buildCSV(cols, tree, allTotals, sumRow(allTotals.grand));
}

function esc(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function wireTable(view, tree){
  view.querySelectorAll("tr.node[data-node]").forEach(tr => tr.addEventListener("click", ()=>{
    const n = tr.dataset.node;
    state.openNodes.has(n) ? state.openNodes.delete(n) : state.openNodes.add(n);
    render();
  }));
  view.querySelectorAll("th.year").forEach(th => th.addEventListener("click", ()=>{
    const y = Number(th.dataset.year);
    state.openYears.has(y) ? state.openYears.delete(y) : state.openYears.add(y);
    render();
  }));
  view.addEventListener("mouseover", e=>{
    const c = e.target.closest("[data-c]"); if(!c) return;
    view.querySelectorAll(".colhl").forEach(el=>el.classList.remove("colhl"));
    view.querySelectorAll(`td[data-c="${c.dataset.c}"]`).forEach(el=>el.classList.add("colhl"));
  });
  view.addEventListener("mouseleave", ()=> view.querySelectorAll(".colhl").forEach(el=>el.classList.remove("colhl")));
  
  // Attach expand all logic so we have the tree object available
  document.getElementById("expandAll").onclick = () => {
    for(const [pId, pNode] of tree){
      state.openNodes.add(`P_${pId}`);
      for(const [mId, mNode] of pNode.mCats){
        state.openNodes.add(`M_${pId}_${mId}`);
        for(const sId of mNode.sCats.keys()) state.openNodes.add(`S_${pId}_${mId}_${sId}`);
      }
    }
    render();
  };
}

/* ---------- CSV export ---------- */
function buildCSV(cols, tree, allTotals, grand){
  const head = ["Szint 1", "Szint 2", "Szint 3", "Szint 4", ...cols.map(c =>
    c.type==="m" ? `${c.y}-${String(c.ym%100).padStart(2,"0")}` : c.type==="y" ? `${c.y} össz.` : "Összesen")];
  
  const line = (n1,n2,n3,n4,t)=>[n1,n2,n3,n4, ...cols.map(c=>{
    const v = c.type==="m" ? (t.perYM.get(c.ym)||0) : c.type==="y" ? (t.yT[c.y]||0) : t.g;
    return Math.round(v);
  })];
  
  const rows=[head];
  const huSort = (a,b) => String(a).localeCompare(String(b), 'hu', {numeric: true});
  const sortedProjs = [...tree.entries()].sort((a,b)=>huSort(a[1].name, b[1].name));
  
  for(const [pId, pNode] of sortedProjs){
    rows.push(line(pNode.name, "","", "", allTotals.p.get(pId)));
    const sortedMCats = [...pNode.mCats.entries()].sort((a,b)=>huSort(a[1].name, b[1].name));
    
    for(const [mId, mNode] of sortedMCats){
      rows.push(line("", mNode.name, "", "", allTotals.m.get(`${pId}_${mId}`)));
      const sortedSCats = [...mNode.sCats.entries()].sort((a,b)=>huSort(a[1].name, b[1].name));
      
      for(const [sId, sNode] of sortedSCats){
        rows.push(line("", "", sNode.name, "", allTotals.s.get(`${pId}_${mId}_${sId}`)));
        const sortedVendors = [...sNode.vendors.keys()].sort((a,b)=>(a===MISSING_VENDOR?1:b===MISSING_VENDOR?-1:huSort(a,b)));
        
        for(const vName of sortedVendors){
          rows.push(line("", "", "", vName, allTotals.v.get(`${pId}_${mId}_${sId}_${vName}`)));
        }
      }
    }
  }
  rows.push(line("Nettó cashflow", "","", "", grand));
  return rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(";")).join("\r\n");
}

/* ---------- toolbar wiring ---------- */
function wireToolbar(){
  const sel = document.getElementById("company");
  for(const c of DB.Companies){
    const o=document.createElement("option"); o.value=c.id; o.textContent=c.Company_Name||("#"+c.id);
    sel.appendChild(o);
  }
  sel.addEventListener("change", ()=>{ state.company=Number(sel.value); render(); });

  const g=document.getElementById("modeGross"), n=document.getElementById("modeNet");
  const setMode = net => { state.bankNet=net;
    g.setAttribute("aria-pressed", String(!net)); n.setAttribute("aria-pressed", String(net)); render(); };
  g.addEventListener("click", ()=>setMode(false));
  n.addEventListener("click", ()=>setMode(true));

  document.getElementById("collapseAll").addEventListener("click", ()=>{ state.openNodes.clear(); render(); });

  document.getElementById("csv").addEventListener("click", ()=>{
    if(!state._csv) return;
    const blob = new Blob(["\uFEFF"+state._csv], {type:"text/csv;charset=utf-8"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="cashflow.csv"; a.click();
    URL.revokeObjectURL(a.href);
  });

  document.getElementById("refresh").addEventListener("click", refresh);
}

async function refresh(){
  const stamp=document.getElementById("stamp");
  stamp.textContent="Betöltés…";
  try{
    await loadAll(); render();
    stamp.textContent="Frissítve "+new Date().toLocaleTimeString("hu-HU",{hour:"2-digit",minute:"2-digit"});
  }catch(err){
    document.getElementById("view").innerHTML =
      `<div class="state"><div class="big">Nem sikerült betölteni az adatokat</div>
       A widget beállításainál a hozzáférést állítsd <code>Full document access</code>-re,
       majd kattints a Frissítés gombra.<br><br><code>${esc(err.message||err)}</code></div>`;
    stamp.textContent="";
  }
}
